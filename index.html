<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a1f,#2c5f2d);
}

.card{
    width:380px;
    padding:45px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    backdrop-filter: blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.icon{
    width:70px;
    height:70px;
    margin:auto;
    margin-bottom:20px;
    border-radius:50%;
    background:#3ddc84;
    color:#0b1f13;
    font-size:30px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
}

h1{
    color:white;
    font-size:30px;
    margin-bottom:25px;
}

.info-box{
    background:rgba(255,255,255,0.06);
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
}

.label{
    font-size:12px;
    color:#b9d8c0;
    letter-spacing:2px;
    margin-bottom:8px;
}

.value{
    color:white;
    font-size:20px;
    font-weight:bold;
}

.btn{
    display:block;
    margin-top:25px;
    padding:15px;
    text-decoration:none;
    background:#3ddc84;
    color:#0b1f13;
    font-weight:bold;
    border-radius:10px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(61,220,132,0.35);
}
</style>
</head>

<body>

<div class="card">

    <div class="icon">P</div>

    <h1>My Portfolio</h1>

    <div class="info-box">
        <div class="label">Name:</div>
        <div class="value">Genard Ignacio</div>
    </div>

    <div class="info-box">
        <div class="label">SECTION</div>
        <div class="value">BSIT1 S8</div>
    </div>

    <a href="Ignacio_Genard_Portfolio.pdf" target="_blank" class="btn">
        View Portfolio
    </a>

</div>

</body>
</html>
